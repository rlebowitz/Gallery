name: Deploy Blazor WASM to GitHub Pages
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and the latest queued.
# However, do NOT cancel in-progress runs, as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

# Default to bash
defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:

    # Checkout the code
    - uses: actions/checkout@v4

    # Install .NET SDK
    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    # Install wasm-tools
    - name: Install .NET WebAssembly Tools
      run: dotnet workload install wasm-tools
      
    
    # Publish the Blazor WASM site
    - name: Publish Blazor Site
      run: dotnet publish Gallery.Web/Gallery.Web.csproj -c Release -o publish -p:GHPages=true

    - name: Upload all published files
      uses: actions/upload-pages-artifact@v3
      with:
        path: publish/wwwroot

# Source - https://stackoverflow.com/a/78349674
    # Posted by programmer
    # Retrieved 2026-04-05, License - CC BY-SA 4.0
    - name: Change base href in App.razor to match gh repo name 🏷️
      run: |
        REPO_NAME=$(echo "${{ github.repository }}" | awk -F '/' '{print $NF}')
        sed -i 's/<base href="\/"[[:blank:]]*\/>/<base href="\/'$REPO_NAME'\/" \/>/g' publish/wwwroot/index.html

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4